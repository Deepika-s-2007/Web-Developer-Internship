<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brochure Design</title>
    <link rel="stylesheet" href="brochure.css">
</head>
<body>

<div class="brochure">

    <div class="cover">
        <h1>Travel Brochure</h1>
        <p>Explore Amazing Destinations Around the World</p>
    </div>

    <div class="content">

        <div class="card">
            <h2>🌍 Destinations</h2>
            <p>Discover beautiful places with unforgettable experiences.</p>
        </div>

        <div class="card">
            <h2>🏨 Hotels</h2>
            <p>Comfortable and affordable stays for every traveler.</p>
        </div>

        <div class="card">
            <h2>✈️ Packages</h2>
            <p>Choose from exciting travel packages and offers.</p>
        </div>

    </div>

</div>

</body>
</html>
