<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Illustration</title>
    <link rel="stylesheet" href="svg.css">
</head>
<body>

<div class="container">

    <h1>SVG Illustration</h1>

    <svg width="300" height="300" viewBox="0 0 300 300">

        <!-- Circle -->
        <circle cx="150" cy="150" r="80"
                fill="#2563eb"
                stroke="#1e40af"
                stroke-width="5"/>

        <!-- Rectangle -->
        <rect x="100" y="100"
              width="100"
              height="100"
              fill="#22c55e"
              opacity="0.7"/>

        <!-- Line -->
        <line x1="50" y1="50"
              x2="250" y2="250"
              stroke="#ef4444"
              stroke-width="4"/>

    </svg>

</div>

</body>
</html>
