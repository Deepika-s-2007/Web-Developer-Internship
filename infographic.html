<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infographic Layout</title>
    <link rel="stylesheet" href="infographic.css">
</head>
<body>

<div class="container">

    <h1>Website Statistics</h1>

    <div class="info-box">
        <div class="card">
            <h2>120K</h2>
            <p>Visitors</p>
        </div>

        <div class="card">
            <h2>8.5K</h2>
            <p>Subscribers</p>
        </div>

        <div class="card">
            <h2>95%</h2>
            <p>Success Rate</p>
        </div>

        <div class="card">
            <h2>24/7</h2>
            <p>Support</p>
        </div>
    </div>

</div>

</body>
</html>
