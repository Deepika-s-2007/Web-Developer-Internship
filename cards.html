<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Cards</title>
    <link rel="stylesheet" href="cards.css">
</head>
<body>

<header>
    <h1>Responsive Cards</h1>
</header>

<section class="cards">

    <div class="card">
        <img src="https://picsum.photos/300/200?random=1" alt="HTML">
        <h2>HTML</h2>
        <p>Learn the basics of HTML and build web pages.</p>
        <button>Read More</button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/200?random=2" alt="CSS">
        <h2>CSS</h2>
        <p>Style your website with modern CSS techniques.</p>
        <button>Read More</button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/200?random=3" alt="JavaScript">
        <h2>JavaScript</h2>
        <p>Add interactivity and dynamic features.</p>
        <button>Read More</button>
    </div>

</section>

</body>
</html>
