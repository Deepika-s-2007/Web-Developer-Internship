<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typography Hierarchy</title>
    <link rel="stylesheet" href="typography.css">
</head>
<body>

<div class="container">

    <h1>Main Heading (H1)</h1>

    <h2>Section Heading (H2)</h2>

    <h3>Sub Heading (H3)</h3>

    <h4>Small Heading (H4)</h4>

    <p>
        This is a paragraph demonstrating typography hierarchy. Different heading
        sizes help users understand the structure and importance of content.
    </p>

    <small>This is small helper text.</small>

</div>

</body>
</html>
