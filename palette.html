<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette System</title>
    <link rel="stylesheet" href="palette.css">
</head>
<body>

<div class="container">

    <h1>Color Palette System</h1>

    <div class="palette">

        <div class="color primary">
            <span>#2563EB</span>
        </div>

        <div class="color secondary">
            <span>#16A34A</span>
        </div>

        <div class="color warning">
            <span>#F59E0B</span>
        </div>

        <div class="color danger">
            <span>#DC2626</span>
        </div>

        <div class="color dark">
            <span>#1F2937</span>
        </div>

        <div class="color light">
            <span>#F3F4F6</span>
        </div>

    </div>

</div>

</body>
</html>
